# ClusterValidator savedsearches.conf
#
# One alert: any Fail in the last hour. Throttle by CorrelationId so a
# single bad run doesn't pager-bomb if it has many Fail records and the
# search runs across both ingestion paths.
#
# Adjust action.* to your alerting infrastructure.

[ClusterValidator - Failures in last hour]
description           = Fires when any Invoke-ClusterValidator run produced a Fail record in the last hour. Includes per-phase + category breakdown.
disabled              = 0
enableSched           = 1
cron_schedule         = */15 * * * *
dispatch.earliest_time = -1h
dispatch.latest_time   = now
search                = eventtype=clustervalidator_fail | stats count by CorrelationId Phase Category Message | sort -count

# Trigger alert when at least one matching event is found.
alert.track            = 1
alert_type             = number of events
alert_comparator       = greater than
alert_threshold        = 0
alert.severity         = 4

# Throttle so a single run with many fails doesn't double-fire.
alert.suppress         = 1
alert.suppress.period  = 1h
alert.suppress.fields  = CorrelationId

# Action stubs - replace with your real channels.
# Email:
# action.email = 1
# action.email.to = sql-oncall@example.com
# action.email.subject = ClusterValidator Fail: $name$
# action.email.format = table
#
# PagerDuty (via Splunk's PagerDuty TA):
# action.pagerduty_incident = 1
# action.pagerduty_incident.param.routing_key = $env:PD_ROUTING_KEY$
#
# Webhook (generic):
# action.webhook = 1
# action.webhook.param.url = https://hooks.example.com/cluster-validator


[ClusterValidator - Quorum witness offline]
description           = Targeted alert on Phase 5 Quorum failures - a witness offline on a SQL FCI is a critical condition that needs a cluster on-call response inside 15 minutes.
disabled              = 0
enableSched           = 1
cron_schedule         = */5 * * * *
dispatch.earliest_time = -15m
search                = eventtype=clustervalidator_quorum_fail Category=QuorumStateError | head 1
alert.track           = 1
alert_type            = number of events
alert_comparator      = greater than
alert_threshold       = 0
alert.severity        = 5
alert.suppress        = 1
alert.suppress.period = 30m
alert.suppress.fields = CorrelationId


[ClusterValidator - Hotfix drift across nodes]
description           = Lower-priority drift alert. Fires once per drift incident; resolves automatically when nodes are aligned.
disabled              = 0
enableSched           = 1
cron_schedule         = 0 7 * * *
dispatch.earliest_time = -25h
dispatch.latest_time   = now
search                = eventtype=clustervalidator_warn Category=HotfixParityError | stats count by CorrelationId
alert.track           = 1
alert_type            = number of events
alert_comparator      = greater than
alert_threshold       = 0
alert.severity        = 2
