# ClusterValidator props.conf
#
# Two sourcetypes:
#   WinEventLog:Application - extracts the embedded JSON from the
#                              EventID 4001 Message field
#   clustervalidator:json   - parses the per-run JSON artifact files

# ---------------------------------------------------------------------------
# Path A - Windows Event Log
# ---------------------------------------------------------------------------
# We add a search-time field extraction so 'spath' isn't required for the
# top-level keys.

[WinEventLog:Application]
# Apply only when SourceName=ClusterValidator. The transforms.conf
# rule REPORT-clustervalidator_json invokes spath on the embedded JSON.
REPORT-clustervalidator_json = clustervalidator_extract_json

# ---------------------------------------------------------------------------
# Path B - JSON artifact files
# ---------------------------------------------------------------------------

[clustervalidator:json]
# Each file is one big JSON array of result records. Treating the file
# as one event is the simplest deploy; use 'spath {} | mvexpand' at
# search time to fan records out individually.
SHOULD_LINEMERGE = false
LINE_BREAKER     = ([\r\n]+)\Z
TRUNCATE         = 0
KV_MODE          = json
TIME_PREFIX      = "Timestamp":"
TIME_FORMAT      = %Y-%m-%dT%H:%M:%S.%6N%Z
MAX_TIMESTAMP_LOOKAHEAD = 32

# Pull the run identifier and the cluster-relevant fields up to top-level
# search-time fields so they appear in the field sidebar without spath.
EXTRACT-correlation_id = "CorrelationId"\s*:\s*"(?<CorrelationId>[^"]+)"
EXTRACT-phase          = "Phase"\s*:\s*"(?<Phase>[^"]+)"
EXTRACT-status         = "Status"\s*:\s*"(?<Status>[^"]+)"
EXTRACT-category       = "Category"\s*:\s*"(?<Category>[^"]+)"
