# ClusterValidator eventtypes.conf
#
# Named eventtypes group searches that reference Status/Category fields.
# Tag them via tags.conf so dashboards and CIM-style searches can reach
# the data without coupling to the underlying sourcetype.

[clustervalidator_run]
search = (sourcetype="WinEventLog:Application" SourceName="ClusterValidator") OR sourcetype="clustervalidator:json"

[clustervalidator_pass]
search = eventtype=clustervalidator_run Status=Pass

[clustervalidator_warn]
search = eventtype=clustervalidator_run Status=Warn

[clustervalidator_fail]
search = eventtype=clustervalidator_run Status=Fail

# Phase-specific eventtypes - useful for at-a-glance dashboards
[clustervalidator_storage_fail]
search = eventtype=clustervalidator_fail Phase=Storage

[clustervalidator_quorum_fail]
search = eventtype=clustervalidator_fail Phase=Quorum

[clustervalidator_scsi3_fail]
search = eventtype=clustervalidator_fail Phase=SCSI3

[clustervalidator_testcluster_fail]
search = eventtype=clustervalidator_fail Phase=TestCluster
