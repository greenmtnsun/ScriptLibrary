# ClusterValidator transforms.conf
#
# clustervalidator_extract_json:
#   Pulls the JSON payload out of the Windows Event Log Message field
#   and exposes its top-level keys (CorrelationId, Summary, Reports.*)
#   as Splunk fields without requiring spath at search time.
#
# The Message field on EventID 4001 looks like:
#   ClusterValidator
#   The description for Event ID '4001' in Source 'ClusterValidator' cannot be found...
#   {"CorrelationId":"...","Nodes":["..."],"Summary":[{...}],"Reports":{...}}
#
# We anchor on the leading '{' so leading verbiage doesn't matter.

[clustervalidator_extract_json]
REGEX  = (\{(?:[^{}]|\{[^{}]*\})*\})
FORMAT = json::$1
SOURCE_KEY = Message

# Reports.* convenience aliases. Splunk's spath produces names like
# "Reports.Html"; we keep the dotted form as canonical.
[clustervalidator_field_aliases]
FIELDALIAS-html       = Reports.Html       AS report_html
FIELDALIAS-json       = Reports.Json       AS report_json
FIELDALIAS-transcript = Reports.Transcript AS report_transcript
