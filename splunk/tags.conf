# ClusterValidator tags.conf
#
# Ties our eventtypes to a single tag so search and dashboards can
# reference 'tag=cluster_health' without knowing which sourcetype or
# eventtype produced the record.

[eventtype=clustervalidator_run]
cluster_health = enabled

[eventtype=clustervalidator_pass]
cluster_health = enabled

[eventtype=clustervalidator_warn]
cluster_health = enabled
warn           = enabled

[eventtype=clustervalidator_fail]
cluster_health = enabled
alert          = enabled
