# ============================================================================
# SQL Server fleet — saved searches / alerts
# ----------------------------------------------------------------------------
# All alerts share these conventions:
#   * Restrict to inventoried SQL hosts via the sql_inventory_lookup CSV.
#   * `env` is enriched on every event so any alert can be filtered/routed by
#     environment (e.g. page on prod only, ticket on stage).
#   * Severity tier:
#       P1 = page on-call now              (service crash, corruption, log full)
#       P2 = ticket within business hours  (backup failure, runaway job)
#       P3 = informational / dashboard     (failed login bursts, silent server)
#
# Replace `action.email.to`, webhook URLs, and PagerDuty integration keys with
# your own. By default only the `index=summary` action is enabled so nothing
# pages on import — flip `disabled = 0` and set the action you want once
# routing is wired up.
# ============================================================================

# ----- P1: SQL service crashed or terminated unexpectedly -------------------
[SQL - P1 - Service Crash or Unexpected Termination]
disabled              = 1
description           = SQL service crash on an inventoried host (Windows SCM EventID 7031/7034). Page on-call.
search                = eventtype=sql_service_events EventCode IN (7031,7034) \
                        | eval host=lower(coalesce(ComputerName,host)) \
                        | lookup sql_inventory_lookup host OUTPUT env role ag_cluster owner \
                        | where isnotnull(env) \
                        | table _time host env role ag_cluster EventCode Message
dispatch.earliest_time = -5m
dispatch.latest_time   = now
cron_schedule          = */5 * * * *
enableSched            = 1
counttype              = number of events
relation               = greater than
quantity               = 0
alert_type             = number of events
alert.track            = 1
alert.severity         = 5
alert.suppress         = 1
alert.suppress.period  = 30m
alert.suppress.fields  = host
action.email           = 0
action.email.to        = sql-oncall@example.com
action.webhook         = 0
action.webhook.param.url = https://events.pagerduty.com/integration/<KEY>/enqueue

# ----- P1: Database corruption / I/O integrity ------------------------------
[SQL - P1 - Corruption or Stack Dump]
disabled              = 1
description           = Logical I/O error, failing-disk retry, assertion, or stack dump on an inventoried host.
search                = eventtype=sql_engine_events EventCode IN (824,825,17066,17310) \
                        | eval host=lower(coalesce(ComputerName,host)) \
                        | lookup sql_inventory_lookup host OUTPUT env role ag_cluster owner \
                        | where isnotnull(env) \
                        | eval issue=case(EventCode==824,"Logical I/O error", EventCode==825,"I/O retry (failing disk)", EventCode==17066,"Assertion failure", EventCode==17310,"Stack dump") \
                        | table _time host env role issue Message
dispatch.earliest_time = -5m
dispatch.latest_time   = now
cron_schedule          = */5 * * * *
enableSched            = 1
counttype              = number of events
relation               = greater than
quantity               = 0
alert.severity         = 5
alert.suppress         = 1
alert.suppress.period  = 1h
alert.suppress.fields  = host,EventCode
action.email           = 0
action.email.to        = sql-oncall@example.com,dba-leads@example.com

# ----- P1: Transaction log or data file full --------------------------------
[SQL - P1 - Log or Data File Full]
disabled              = 1
description           = Transaction log full (9002) or data file full (1105). Database is read-only or aborting.
search                = eventtype=sql_engine_events EventCode IN (9002,1105) \
                        | eval host=lower(coalesce(ComputerName,host)) \
                        | lookup sql_inventory_lookup host OUTPUT env role owner \
                        | where isnotnull(env) \
                        | rex field=Message "(?i)database\s*['\"]?(?<db>[A-Za-z0-9_\-\.]+)" \
                        | table _time host env db EventCode Message
dispatch.earliest_time = -5m
dispatch.latest_time   = now
cron_schedule          = */5 * * * *
enableSched            = 1
counttype              = number of events
relation               = greater than
quantity               = 0
alert.severity         = 5
alert.suppress         = 1
alert.suppress.period  = 30m
alert.suppress.fields  = host,db
action.email           = 0
action.email.to        = sql-oncall@example.com

# ----- P1: AG state degradation ---------------------------------------------
[SQL - P1 - Availability Group Suspended or Connection Timeout]
disabled              = 1
description           = AG replica suspended (35264) or persistent connection timeout (35206) on a prod replica.
search                = eventtype=sql_engine_events EventCode IN (35264,35206) \
                        | eval host=lower(coalesce(ComputerName,host)) \
                        | lookup sql_inventory_lookup host OUTPUT env role ag_cluster owner \
                        | where isnotnull(env) AND env="prod" \
                        | table _time host env ag_cluster role EventCode Message
dispatch.earliest_time = -5m
dispatch.latest_time   = now
cron_schedule          = */5 * * * *
enableSched            = 1
counttype              = number of events
relation               = greater than
quantity               = 0
alert.severity         = 5
alert.suppress         = 1
alert.suppress.period  = 30m
alert.suppress.fields  = ag_cluster,host
action.email           = 0
action.email.to        = sql-oncall@example.com

# ----- P2: Backup failure ---------------------------------------------------
[SQL - P2 - Backup Failure]
disabled              = 1
description           = SQL backup failed (3041). Ticket within business hours; page if same DB fails twice in 2h.
search                = eventtype=sql_engine_events EventCode=3041 \
                        | eval host=lower(coalesce(ComputerName,host)) \
                        | lookup sql_inventory_lookup host OUTPUT env role owner \
                        | where isnotnull(env) \
                        | rex field=Message "(?i)database\s*['\"]?(?<db>[A-Za-z0-9_\-\.]+)" \
                        | table _time host env db Message
dispatch.earliest_time = -15m
dispatch.latest_time   = now
cron_schedule          = */15 * * * *
enableSched            = 1
counttype              = number of events
relation               = greater than
quantity               = 0
alert.severity         = 4
alert.suppress         = 1
alert.suppress.period  = 2h
alert.suppress.fields  = host,db
action.email           = 0
action.email.to        = dba-team@example.com

# ----- P2: Runaway SQL Agent job (custom telemetry, MAD/Z-score) ------------
[SQL - P2 - Runaway Agent Job (Modified Z >= 5)]
disabled              = 1
description           = Modified Z-score >= 5 from Invoke-TelemetryANDAnomoly.ps1 — current run far exceeds historical median.
search                = eventtype=sql_custom_telemetry EventCode=2001 \
                        | rex field=Message "(?ms)(?<json>\{.*\})" \
                        | spath input=json \
                        | where ModifiedZScore >= 5 \
                        | eval host=lower(coalesce(ComputerName,host)) \
                        | lookup sql_inventory_lookup host OUTPUT env role owner \
                        | where isnotnull(env) \
                        | table _time host env JobName CurrentDurationSeconds HistoricalMedianSeconds ModifiedZScore
dispatch.earliest_time = -5m
dispatch.latest_time   = now
cron_schedule          = */5 * * * *
enableSched            = 1
counttype              = number of events
relation               = greater than
quantity               = 0
alert.severity         = 4
alert.suppress         = 1
alert.suppress.period  = 1h
alert.suppress.fields  = host,JobName
action.email           = 0
action.email.to        = dba-team@example.com

# ----- P2: SQL Agent job step failure ---------------------------------------
[SQL - P2 - Agent Job Step Failure]
disabled              = 1
description           = SQL Agent job step failed (208). Suppress per host+job for 30 minutes to avoid storms.
search                = eventtype=sql_agent_events EventCode=208 \
                        | eval host=lower(coalesce(ComputerName,host)) \
                        | lookup sql_inventory_lookup host OUTPUT env role owner \
                        | where isnotnull(env) \
                        | rex field=Message "(?ms)Job\s+['\"]?(?<job_name>[^'\"\r\n]+?)['\"]?\s" \
                        | table _time host env job_name Message
dispatch.earliest_time = -15m
dispatch.latest_time   = now
cron_schedule          = */15 * * * *
enableSched            = 1
counttype              = number of events
relation               = greater than
quantity               = 0
alert.severity         = 4
alert.suppress         = 1
alert.suppress.period  = 30m
alert.suppress.fields  = host,job_name
action.email           = 0
action.email.to        = dba-team@example.com

# ----- P3: Failed-login burst -----------------------------------------------
[SQL - P3 - Failed Login Burst]
disabled              = 1
description           = >25 failed logins (18456) from a single client IP in 15 minutes against any inventoried SQL host.
search                = eventtype=sql_engine_events EventCode=18456 \
                        | eval host=lower(coalesce(ComputerName,host)) \
                        | lookup sql_inventory_lookup host OUTPUT env role owner \
                        | where isnotnull(env) \
                        | rex field=Message "(?i)Login failed for user '(?<login_user>[^']+)'" \
                        | rex field=Message "(?i)CLIENT:\s*\[?(?<client_ip>[0-9a-fA-F\.\:]+)\]?" \
                        | stats count by host env login_user client_ip \
                        | where count >= 25
dispatch.earliest_time = -15m
dispatch.latest_time   = now
cron_schedule          = */15 * * * *
enableSched            = 1
counttype              = number of events
relation               = greater than
quantity               = 0
alert.severity         = 3
alert.suppress         = 1
alert.suppress.period  = 1h
alert.suppress.fields  = host,client_ip
action.email           = 0
action.email.to        = secops@example.com,dba-team@example.com

# ----- P3: Silent server (inventoried host with no events in 30m) -----------
[SQL - P3 - Silent Inventoried Server]
disabled              = 1
description           = An inventoried SQL host produced ZERO Application/System events in the last 30 minutes — UF down, host down, or SQL stopped.
search                = | inputlookup sql_inventory_lookup \
                        | fields host env role owner \
                        | join type=left host [ \
                            search eventtype=sql_engine_events OR eventtype=sql_agent_events OR eventtype=sql_service_events OR eventtype=sql_custom_telemetry \
                            | eval host=lower(coalesce(ComputerName,host)) \
                            | stats count by host \
                          ] \
                        | where isnull(count) \
                        | table host env role owner
dispatch.earliest_time = -30m
dispatch.latest_time   = now
cron_schedule          = */15 * * * *
enableSched            = 1
counttype              = number of events
relation               = greater than
quantity               = 0
alert.severity         = 3
alert.suppress         = 1
alert.suppress.period  = 2h
alert.suppress.fields  = host
action.email           = 0
action.email.to        = dba-team@example.com,monitoring@example.com


# ============================================================================
# SCHEDULED SUMMARY REPORTS
# ----------------------------------------------------------------------------
# These are *reports* — they email a digest at a fixed time. They do not page.
# By default disabled = 1; flip and set action.email.to to activate.
# Format = HTML inline so it renders in Outlook / Gmail without attachments.
# ============================================================================

# ----- Daily Executive Digest (07:00 every day) ----------------------------
[SQL - Report - Daily Exec Digest]
disabled              = 1
description           = Daily 07:00 digest emailed to leadership: per-env health, P1 counts, top failing hosts, backup posture, security headline.
search                = (eventtype=sql_engine_events OR eventtype=sql_agent_events OR eventtype=sql_service_events OR eventtype=sql_custom_telemetry) \
                        | eval host=lower(coalesce(ComputerName,host)) \
                        | lookup sql_inventory_lookup host OUTPUT env role ag_cluster owner \
                        | where isnotnull(env) \
                        | eval bucket=case( \
                            eventtype=="sql_service_events" AND EventCode IN (7031,7034),"P1 - service crash", \
                            EventCode IN (824,825,17066,17310),"P1 - corruption/dump", \
                            EventCode IN (9002,1105),"P1 - file full", \
                            EventCode IN (35206,35264),"P1 - AG degraded", \
                            EventCode==3041,"P2 - backup failure", \
                            EventCode==208,"P2 - job step failure", \
                            EventCode==18456,"P3 - failed login", \
                            true(),"info") \
                        | where bucket!="info" \
                        | stats count by env bucket \
                        | sort env bucket
dispatch.earliest_time = -24h@h
dispatch.latest_time   = @h
cron_schedule          = 0 7 * * *
enableSched            = 1
is_visible             = 1
action.email           = 0
action.email.to        = sql-leadership@example.com,dba-team@example.com
action.email.subject   = [SQL Fleet] Daily Health Digest — $job.endTime$
action.email.format    = table
action.email.inline    = 1
action.email.sendresults = 1
action.email.sendpdf   = 0

# ----- Weekly Fleet Health Report (Mondays 06:00) --------------------------
[SQL - Report - Weekly Fleet Health]
disabled              = 1
description           = Monday 06:00 weekly rollup: severity counts per env, top 10 noisy hosts, backup success rate per host, AG flap count.
search                = (eventtype=sql_engine_events OR eventtype=sql_agent_events OR eventtype=sql_service_events OR eventtype=sql_custom_telemetry) \
                        | eval host=lower(coalesce(ComputerName,host)) \
                        | lookup sql_inventory_lookup host OUTPUT env role ag_cluster owner \
                        | where isnotnull(env) \
                        | eval severity=case( \
                            eventtype=="sql_service_events" AND EventCode IN (7031,7034),"critical", \
                            EventCode IN (824,825,17066,17310,9002,1105),"critical", \
                            EventCode IN (3041,833,17890,208,18456),"warning", \
                            true(),"info") \
                        | stats count(eval(severity=="critical")) as Critical \
                                count(eval(severity=="warning")) as Warning \
                                count(eval(EventCode=3041)) as BackupFails \
                                count(eval(EventCode=3014)) as BackupOK \
                                count(eval(EventCode IN (1480,35206,35264,35265,41131))) as AGEvents \
                                count as TotalEvents \
                          by env host \
                        | eval BackupSuccessPct=if((BackupOK+BackupFails)>0,round(100*BackupOK/(BackupOK+BackupFails),1),"n/a") \
                        | sort env -TotalEvents \
                        | rename env as Env host as Host
dispatch.earliest_time = -7d@d
dispatch.latest_time   = @d
cron_schedule          = 0 6 * * 1
enableSched            = 1
action.email           = 0
action.email.to        = dba-leads@example.com,sql-leadership@example.com
action.email.subject   = [SQL Fleet] Weekly Health Report — week ending $job.endTime$
action.email.format    = table
action.email.inline    = 1
action.email.sendresults = 1

# ----- Daily Backup Coverage Report (06:00) --------------------------------
[SQL - Report - Daily Backup Coverage]
disabled              = 1
description           = 06:00 daily report: per-host backup success/failure last 24h. Highlights any host with zero successful backups.
search                = eventtype=sql_engine_events EventCode IN (3014,3041) \
                        | eval host=lower(coalesce(ComputerName,host)) \
                        | lookup sql_inventory_lookup host OUTPUT env role owner \
                        | where isnotnull(env) \
                        | stats count(eval(EventCode=3014)) as Successes \
                                count(eval(EventCode=3041)) as Failures \
                                latest(eval(if(EventCode=3014,_time,null()))) as last_success_epoch \
                          by env host \
                        | eval last_success=if(isnotnull(last_success_epoch),strftime(last_success_epoch,"%Y-%m-%d %H:%M"),"NONE in 24h") \
                        | eval Coverage=case(Successes=0,"NO BACKUP", Failures>0,"DEGRADED", true(),"OK") \
                        | fields env host Successes Failures Coverage last_success \
                        | sort env Coverage host \
                        | rename env as Env host as Host last_success as "Last Successful Backup"
dispatch.earliest_time = -24h@h
dispatch.latest_time   = @h
cron_schedule          = 0 6 * * *
enableSched            = 1
action.email           = 0
action.email.to        = dba-team@example.com
action.email.subject   = [SQL Fleet] Backup Coverage — $job.endTime$
action.email.format    = table
action.email.inline    = 1
action.email.sendresults = 1

# ----- Monthly Trend Report (1st of month, 06:00) --------------------------
[SQL - Report - Monthly Trend]
disabled              = 1
description           = 1st of month 06:00 trend rollup vs. previous month: failed logins, backup failures, job failures, runaway anomalies.
search                = (eventtype=sql_engine_events OR eventtype=sql_agent_events OR eventtype=sql_custom_telemetry) \
                        | eval host=lower(coalesce(ComputerName,host)) \
                        | lookup sql_inventory_lookup host OUTPUT env \
                        | where isnotnull(env) \
                        | eval metric=case( \
                            EventCode==18456,"Failed Logins", \
                            EventCode==3041,"Backup Failures", \
                            eventtype=="sql_agent_events" AND EventCode==208,"Job Failures", \
                            eventtype=="sql_custom_telemetry" AND EventCode==2001,"Runaway Anomalies") \
                        | where isnotnull(metric) \
                        | timechart span=1d count by metric
dispatch.earliest_time = -30d@d
dispatch.latest_time   = @d
cron_schedule          = 0 6 1 * *
enableSched            = 1
action.email           = 0
action.email.to        = sql-leadership@example.com
action.email.subject   = [SQL Fleet] Monthly Trend — $job.endTime$
action.email.format    = table
action.email.inline    = 1
action.email.sendresults = 1
